name: Simple HTTP Proxy for Telegram
on:
  workflow_dispatch:
jobs:
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y python3-pip
          pip install http-proxy

      - name: Run HTTP Proxy
        run: |
          http_proxy --port 1080 &
          sleep 2
          echo "HTTP Proxy running on port 1080"

      - name: Install and run ngrok
        run: |
          # Download ngrok
          curl -L --output ngrok.tgz https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz
          tar xvzf ngrok.tgz
          
          # Add auth token and expose port 1080 via ngrok HTTP
          ./ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          ./ngrok http 1080 --log=stdout &
          sleep 10
          
          # Get the tunnel URL from ngrok API
          TUNNEL_URL=$(curl -s localhost:4040/api/tunnels | grep -o '"public_url":"https://[^"]*' | grep -o 'https://[^"]*')
          echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
          echo "::notice::Tunnel URL: $TUNNEL_URL"
          sleep 21000
