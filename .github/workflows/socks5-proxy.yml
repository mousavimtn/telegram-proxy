name: SOCKS5 Proxy for Telegram
on:
  workflow_dispatch:
jobs:
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y python3-pip
          pip install python-telegram-bot[socks]

      - name: Run SOCKS5 Proxy
        run: |
          python3 -c "
          import asyncio
          async def handle_client(reader, writer):
              try:
                  remote_reader, remote_writer = await asyncio.open_connection('telegram.org', 443)
                  async def forward(src, dst):
                      try:
                          while True:
                              data = await src.read(4096)
                              if not data: break
                              dst.write(data)
                              await dst.drain()
                      except: pass
                  await asyncio.gather(forward(reader, remote_writer), forward(remote_reader, writer))
              except: pass
          async def main():
              server = await asyncio.start_server(handle_client, '0.0.0.0', 1080)
              print('SOCKS5 Proxy running on port 1080')
              async with server:
                  await server.serve_forever()
          asyncio.run(main())
          " &

      - name: Install and run ngrok
        run: |
          # Download ngrok
          curl -L --output ngrok.tgz https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz
          tar xvzf ngrok.tgz

          # Add auth token and expose port 1080 via ngrok TCP
          ./ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          ./ngrok tcp 1080 --log=stdout &
          sleep 10

          # Get the tunnel URL from ngrok API
          TUNNEL_URL=$(curl -s localhost:4040/api/tunnels | grep -o '"public_url":"tcp://[^"]*' | grep -o 'tcp://[^"]*')
          echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
          echo "::notice::Tunnel URL: $TUNNEL_URL"
          sleep 21000
